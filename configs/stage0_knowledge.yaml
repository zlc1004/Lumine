# Lumine Stage 0: Knowledge Injection (OPTIMIZED for 8x RTX 6000 Pro Blackwell)
# Injects Genshin Impact lore/wiki Q&A into the base model (text-only, no actions)
# Base: Qwen2-VL-7B-Instruct (using Instruct for better stop behavior)
# Hardware: 192 CPU cores, 2TB RAM, 8x96GB GPUs

model:
  model_path: models/Qwen2-VL-7B-Instruct  # Changed from Base to Instruct
  attn_implementation: flash_attention_2
  add_custom_tokens: false  # No action tokens needed for text-only lore Q&A

data:
  train_path: configs/data_knowledge.yaml
  chat_template: qwen2vl
  max_seq_len: 4096  # Long enough for wiki articles and multi-turn Q&A
  train_size: -1  # Use all available knowledge data
  datasets_type: mapping
  source_name: lumine_knowledge
  num_workers: 128  # 16 workers per GPU (192 cores / 8 GPUs = 24, use ~16 for headroom)
  prefetch_factor: 4  # Prefetch 4 batches per worker
  mm_configs:
    image_max_pixels: 921600
    video_max_pixels: 921600
    max_frames: 1
    fps: 1.0
    use_audio_in_video: false

train:
  output_dir: output/Lumine-Agent-Knowledge-VL-7B
  data_parallel_mode: fsdp2
  wandb_project: lumine
  wandb_name: lumine_stage0_knowledge_optimized
  rmpad: false
  rmpad_with_pos_ids: true
  ulysses_parallel_size: 1
  freeze_vit: true  # No vision data - freeze ViT to save memory and avoid degradation
  lr: 2.0e-5
  init_device: meta
  enable_fsdp_offload: false
  lr_decay_style: cosine
  num_train_epochs: 3
  
  # MASSIVE batch size for text-only (no images = tiny memory footprint)
  micro_batch_size: 32  # 8x larger than before (text is lightweight)
  # 8 GPUs x 32 MBS x 1 grad_accum = 256 global batch size
  global_batch_size: 256
  
  # No max_steps - will train for full dataset × num_train_epochs
  save_steps: null  # Don't save intermediate checkpoints
  save_epochs: 1    # Only save at end of each epoch (final checkpoint)
  enable_gradient_checkpointing: false  # Disable for speed (plenty of VRAM for text)
