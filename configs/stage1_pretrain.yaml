# Lumine Stage 1: Blackwell-Optimized Pre-training
# Adjusted for 8x NVIDIA RTX PRO 6000 Ada (96GB VRAM each)
# Loads Stage 0 checkpoint with injected Genshin lore/wiki knowledge

model:
  model_path: models/Lumine-Agent-Knowledge-VL-7B
  attn_implementation: flash_attention_2
  add_custom_tokens: true # Add custom tokens for agent pretraining (action markers, UI elements, etc.)

data:
  train_path: configs/data_pretrain.yaml
  chat_template: qwen2vl
  max_seq_len: 12288
  train_size: 8000000
  datasets_type: mapping
  source_name: lumine_pretrain
  num_workers: 32
  drop_last: false  # Don't drop incomplete batches
  mm_configs:
    image_max_pixels: 921600
    video_max_pixels: 921600
    max_frames: 8
    fps: 2.0
    use_audio_in_video: false

train:
  output_dir: output/Lumine-Agent-Pretrain-VL-7B
  data_parallel_mode: fsdp2
  wandb_project: lumine
  wandb_name: lumine_rtx6000_720p_8frame
  rmpad: false # Disabled - using rmpad_with_pos_ids instead
  rmpad_with_pos_ids: true # Enabled for speed: skips padding tokens
  ulysses_parallel_size: 1
  freeze_vit: false
  lr: 1.0e-5
  init_device: meta
  enable_fsdp_offload: false
  lr_decay_style: cosine
  num_train_epochs: 2
  # Balanced: MBS=2 for 12k sequences with checkpointing OFF
  micro_batch_size: 2
  # 8 GPUs x 2 MBS x 6 grad_accum = 96 global batch size
  global_batch_size: 96
  # No max_steps - will train for full 8M samples × 2 epochs = 166k steps
  save_steps: null  # Don't save intermediate checkpoints
  save_epochs: 1    # Only save at end of each epoch (final checkpoint)
  # RE-ENABLED: Gradient checkpointing needed for 12k sequences
  enable_gradient_checkpointing: true