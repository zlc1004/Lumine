# Lumine Instruction-Following Data Config
# This is where annotated game frames (image -> action sequences) go

sources:
  - genshin_actions.jsonl  # Generated by scripts/annotate_frames_parallel.py
names:
  - lumine_instruct
preprocessor: lumine_instruct
drop_last: false  # Don't drop incomplete batches
schedule:
  - schedule_type: const
    weights: [1.0]
